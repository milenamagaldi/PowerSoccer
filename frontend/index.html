<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Power Soccer - Coleta Duolingo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="escudo-bloqueio" class="bloqueio-tela"></div>
    <header class="duo-header">
        <div class="logo">
            <span class="cor-duo">Power</span>Scout
        </div>
        <a href="dashboard.html" class="button">Visualizar Estatísticas</a>
        <div id="g_id_onload"
             data-client_id="SEU_CLIENT_ID_DO_GOOGLE_AQUI.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>
    </header>

    <div class="layout-principal">
        
        <aside class="titulares duo-container">
            <h3>⚽ Titulares</h3>
            <div class="jogador ativo" data-id="1">
                <div class="foto">L</div>
                <span>Lucas (10)</span>
            </div>
            <div class="jogador" data-id="2">
                <div class="foto">J</div>
                <span>João (7)</span>
            </div>
        </aside>

        <main class="area-campo">
            <div class="campo-container duo-card" id="campo">
                <svg id="quadra-svg" viewBox="0 0 800 500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <rect width="800" height="500" fill="#056839"/> <rect x="20" y="20" width="760" height="460" fill="none" stroke="white" stroke-width="4" rx="15"/>
                    <line x1="400" y1="20" x2="400" y2="480" stroke="white" stroke-width="4"/>
                    <circle cx="400" cy="250" r="70" fill="none" stroke="white" stroke-width="4"/>
                    <circle cx="400" cy="250" r="6" fill="white"/>
                    <rect x="20" y="125" width="120" height="250" fill="none" stroke="white" stroke-width="4" rx="10"/>
                    <rect x="660" y="125" width="120" height="250" fill="none" stroke="white" stroke-width="4" rx="10"/>
                    <line x1="20" y1="210" x2="20" y2="290" stroke="#650e14" stroke-width="8"/> <line x1="780" y1="210" x2="780" y2="290" stroke="#650e14" stroke-width="8"/>
                </svg>
            </div>

            <div class="linha-tempo-container duo-card">
                <label for="tempo-video">⏱️ Tempo de Jogo: <span id="tempo-display" class="cor-duo">00:00</span></label>
                <input type="range" id="tempo-video" min="0" max="2400" value="0">
            </div>
            
            <section class="reservas duo-container">
                <h4>Reservas</h4>
                <div class="lista-reservas">
                    <div class="jogador" data-id="3"><span>Pedro (5)</span></div>
                    <div class="jogador" data-id="4"><span>Marcos (8)</span></div>
                </div>
            </section>
        </main>
        
        <aside class="historico duo-container">
            <h3>📝 Últimos Lances</h3>
            <div id="lista-historico" class="duo-list">
                </div>
        </aside>

    </div>

    <div id="modal-acao" class="escondido duo-modal">
        <h4 id="modal-titulo">Ação aos 00:00</h4>
        <div class="botoes-acao">
            <button class="btn-acao btn-duo-azul" data-tipo="Passe Certo">Passe Certo</button>
            <button class="btn-acao btn-duo-vermelho" data-tipo="Passe Errado">Passe Errado</button>
            <button class="btn-acao btn-duo-laranja" data-tipo="Interceptação">Interceptação</button>
            <button class="btn-acao btn-duo-roxo" data-tipo="Finalização">Finalização</button>
            <button class="btn-acao btn-duo-amarelo" data-tipo="Gol">Gol</button>
        </div>
        <button id="fechar-modal" class="btn-cancelar">Cancelar</button>
    </div>

    <div id="modal-edicao" class="escondido duo-modal" style="width: 300px; text-align: center;">
        <h4>⚙️ Opções do Lance</h4>
        
        <div style="margin: 15px 0; text-align: left;">
            <label style="font-size: 14px; color: #aaa;">Alterar Ação:</label>
            <select id="editar-tipo-acao" style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 8px; background: #444; color: white; border: none;">
                <option value="Passe Certo">Passe Certo</option>
                <option value="Passe Errado">Passe Errado</option>
                <option value="Interceptação">Interceptação</option>
                <option value="Finalização">Finalização</option>
                <option value="Gol">Gol</option>
            </select>

            <label style="font-size: 14px; color: #aaa; display: block; margin-top: 10px;">Alterar Minuto (MM:SS):</label>
            <input type="text" id="editar-minuto" style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 8px; background: #444; color: white; border: none; text-align: center;">
        </div>

        <div style="display: flex; gap: 10px; flex-direction: column;">
            <button id="btn-salvar-edicao" class="btn-acao btn-duo-primary">Salvar Alterações</button>
            <button id="btn-eliminar-definitivo" class="btn-acao btn-duo-vermelho">Eliminar Lance</button>
            <button id="btn-cancelar-edicao" class="btn-cancelar">Cancelar</button>
        </div>
    </div>

    <div id="modal-substituicao" class="escondido duo-modal" style="width: 320px; text-align: center;">
        <h4>🔄 Substituição</h4>
        <p id="texto-substituicao" style="margin: 15px 0; font-size: 15px; color: white;"></p>
        
        <div style="display: flex; gap: 10px; flex-direction: column;">
            <button id="btn-confirmar-sub" class="btn-acao btn-duo-primary">Confirmar</button>
            <button id="btn-cancelar-sub" class="btn-cancelar">Cancelar</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Função placeholder para o Google Login
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            alert("Login com Google simulado! (Lógica no backend pendente)");
        }
    </script>
</body>
</html>
