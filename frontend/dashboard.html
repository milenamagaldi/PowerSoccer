<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Estatísticas - Power Soccer</title>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: Arial; padding: 40px; }
        h1 { color: #ffffff; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: #2d2d2d; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #444; }
        th { background-color: #650e14; }
        .menu-botoes { display: flex; gap: 15px; margin-bottom: 20px; }
        .voltar { background: #056839; padding: 10px 20px; border-radius: 12px; text-decoration: none; color: white; font-weight: bold; transition: transform 0.2s; }
        .voltar:hover { background: #3daa57; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="menu-botoes">
        <a href="home.html" class="voltar">🏠 Home</a>
        <a href="index.html" class="voltar">📋 Coleta de Dados</a>
    </div>
    
    <h1>Estatísticas Globais da Equipe</h1>

    <table>
        <thead>
            <tr>
                <th>Atleta</th>
                <th>Gols</th>
                <th>Finalizações</th>
                <th>Passes Certos</th>
                <th>Passes Errados</th>
                <th>Interceptações</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
        </tbody>
    </table>
    
    <div style="width: 800px; background-color: #2d2d2d; padding: 20px; margin-top: 30px; border-radius: 8px;">
        <h2>Comparativo de Passes Certos</h2>
        <canvas id="graficoPasses"></canvas>
    </div>
    
    <script src="dashboard.js"></script>
</body>
</html>
